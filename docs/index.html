<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Overtone OT26-GC — site map</title>
<link rel="stylesheet" href="./vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="./vendor/markercluster/MarkerCluster.css">
<link rel="stylesheet" href="./vendor/markercluster/MarkerCluster.Default.css">
<style>
  html,body{margin:0;height:100%}
  #map{position:absolute;inset:0}
  .panel{font:13px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .leaflet-popup-content{margin:10px 12px}
  .pv video,.pv img{display:block;border-radius:6px;max-width:300px;width:100%;background:#000}
  .cap{margin-top:6px;font:12px/1.35 system-ui;color:#333;word-break:break-word}
  .cap a{color:#1a6dd6}
  .ctl{background:rgba(28,28,30,.92);color:#eee;padding:10px 12px;border-radius:8px;
       font:13px/1.4 system-ui;box-shadow:0 1px 6px rgba(0,0,0,.4);min-width:180px}
  .ctl h4{margin:0 0 6px;font-size:13px;font-weight:600}
  .ctl label{display:flex;align-items:center;gap:6px;margin:3px 0;cursor:pointer}
  .ctl input[type=range]{width:100%}
  .sw{width:12px;height:12px;border-radius:50%;display:inline-block;border:1px solid #0006}
  .muted{color:#aaa;font-size:11px}
  .pdot{width:11px;height:11px;border-radius:50%;background:#ffcc00;border:1.5px solid #fff;box-shadow:0 0 2px #0007}
  .pcl{width:30px;height:30px;border-radius:50%;background:rgba(255,204,0,.92);border:2px solid #fff;
       display:flex;align-items:center;justify-content:center;font:bold 12px system-ui;color:#222;box-shadow:0 0 4px #0007}
</style>
</head>
<body>
<div id="map"></div>
<script src="./vendor/leaflet/leaflet.js"></script>
<script src="./vendor/markercluster/leaflet.markercluster.js"></script>
<script>
const OVERLAY_BOUNDS = [[-27.9590692,153.3882227],[-27.9551602,153.3944824]]; // [S,W],[N,E]

const map = L.map('map',{zoomControl:true});
L.control.scale({imperial:false}).addTo(map);

// Stacking: cones (decor, non-clickable) < video dots < photo dots (always on top)
map.createPane('conePane');  map.getPane('conePane').style.zIndex=406;
map.getPane('conePane').style.pointerEvents='none';
map.createPane('videoPane'); map.getPane('videoPane').style.zIndex=407;
map.createPane('photoPane'); map.getPane('photoPane').style.zIndex=408;
const coneR  = L.svg({pane:'conePane'});
const videoR = L.svg({pane:'videoPane'});
const photoR = L.svg({pane:'photoPane'});

// fix-facing mode: click a photo dot to flip its cone 180°, collect the list
let fixMode=false;
const flipped=new Set();
const coneLayers={};
function drawCone(f){
  if(coneLayers[f.name]) facing.removeLayer(coneLayers[f.name]);
  coneLayers[f.name]=L.polygon(cone(f.lat,f.lon,f.dir),{renderer:coneR,interactive:false,
    stroke:false,fillColor:'#ffcc00',fillOpacity:.12}).addTo(facing);
}
function toggleFlip(f){
  f.dir=Math.round(((f.dir+180)%360)*10)/10;
  flipped.has(f.name)?flipped.delete(f.name):flipped.add(f.name);
  drawCone(f);
  const out=document.getElementById('flipout'); if(out) out.value=[...flipped].sort().join(',');
}

// --- basemap (Esri World Imagery) ---
const sat = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:21, maxNativeZoom:19, attribution:'Imagery &copy; Esri'}).addTo(map);
const labels = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:21, maxNativeZoom:19});

// --- site plan overlay ---
const plan = L.imageOverlay('./overlay/siteplan.jpg', OVERLAY_BOUNDS, {opacity:0.75}).addTo(map);

// --- layer groups ---
const PHOTO_ICON = L.divIcon({className:'',iconSize:[13,13],iconAnchor:[6.5,6.5],html:'<div class="pdot"></div>'});
const photos = L.markerClusterGroup({
  maxClusterRadius:24, showCoverageOnHover:false, spiderfyDistanceMultiplier:1.8,
  iconCreateFunction:c=>L.divIcon({className:'',iconSize:[30,30],html:`<div class="pcl">${c.getChildCount()}</div>`})
}).addTo(map);
const videos = L.layerGroup().addTo(map);
const facing = L.layerGroup().addTo(map);   // camera view cones
const track  = L.layerGroup().addTo(map);

const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// destination point from (lat,lon) along a true bearing (deg) for distance (m)
function dest(lat,lon,brg,d){
  const b=brg*Math.PI/180;
  return [lat+(d*Math.cos(b))/111320, lon+(d*Math.sin(b))/(111320*Math.cos(lat*Math.PI/180))];
}
// a view-cone (fan) polygon pointing the way the camera faced
function cone(lat,lon,brg,R=7,fov=50){
  const pts=[[lat,lon]];
  for(let a=-fov/2;a<=fov/2;a+=fov/6) pts.push(dest(lat,lon,brg+a,R));
  pts.push([lat,lon]);
  return pts;
}

fetch('./data/media.json').then(r=>r.json()).then(items=>{
  const pts=[];
  items.forEach(f=>{
    pts.push([f.lat,f.lon]);
    if(f.type==='photo'){
      const photoHtml=()=>{
        const facingTxt=(f.dir!=null)?`<br>Facing ~${f.dir}° (true N)`:'';
        return `<div class="pv"><a href="${f.full}" target="_blank" rel="noopener">`+
          `<img src="${f.thumb}" loading="lazy" alt=""></a>`+
          `<div class="cap"><b>${esc(f.name)}</b><br>${esc(f.ts)}${facingTxt} · `+
          `<a href="${f.full}" target="_blank" rel="noopener">full photo</a></div></div>`;
      };
      const pm=L.marker([f.lat,f.lon],{icon:PHOTO_ICON}).addTo(photos);
      pm.on('click',()=>{
        if(fixMode && f.dir!=null) toggleFlip(f);
        else L.popup({maxWidth:320}).setLatLng([f.lat,f.lon]).setContent(photoHtml()).openOn(map);
      });
      if(f.dir!=null) drawCone(f);
    }else{
      const html=`<div class="pv"><video controls playsinline preload="none" poster="${f.thumb}">`+
        `<source src="${f.full}" type="video/mp4"></video>`+
        `<div class="cap"><b>${esc(f.name)}</b><br>${esc(f.ts)} · `+
        `<a href="${f.full}" target="_blank" rel="noopener">open / download</a></div></div>`;
      L.circleMarker([f.lat,f.lon],{renderer:videoR,radius:6,color:'#fff',weight:1,fillColor:'#e5484d',fillOpacity:.95})
        .bindPopup(html,{maxWidth:340,minWidth:300}).addTo(videos);
    }
  });
  if(pts.length) map.fitBounds(pts,{padding:[40,40]});
  else map.fitBounds(OVERLAY_BOUNDS);
});

fetch('./data/track.geojson').then(r=>r.json()).then(gj=>{
  L.geoJSON(gj,{style:{color:'#22d3ee',weight:2.5,opacity:.9}}).addTo(track);
});

// --- Leaflet layer control ---
L.control.layers(
  {'Satellite':sat},
  {'Place labels':labels,'Site plan':plan,'Photos':photos,'Facing (view cones)':facing,'Videos':videos,'GPS track':track},
  {collapsed:false}
).addTo(map);

// --- custom control: overlay opacity + legend ---
const info=L.control({position:'topright'});
info.onAdd=function(){
  const d=L.DomUtil.create('div','ctl');
  d.innerHTML=`<h4>Overtone · OT26-GC</h4>
    <label>Site plan opacity <input id="op" type="range" min="0" max="1" step="0.05" value="0.75"></label>
    <div style="margin-top:6px">
      <label><span class="sw" style="background:#ffcc00"></span> Photos <span class="muted">(cone = facing)</span></label>
      <label><span class="sw" style="background:#e5484d"></span> Videos (play inline)</label>
      <label><span class="sw" style="background:#22d3ee;border-radius:2px"></span> GPS track</label>
    </div>
    <label style="margin-top:8px;border-top:1px solid #ffffff22;padding-top:6px">
      <input type="checkbox" id="fix"> Fix-facing mode</label>
    <div class="muted">On → click a wrong cone's dot to flip it, then send me this list:</div>
    <textarea id="flipout" readonly placeholder="(flipped filenames appear here)"
      style="width:100%;height:38px;font:11px monospace;margin-top:4px;box-sizing:border-box"></textarea>`;
  L.DomEvent.disableClickPropagation(d);
  d.querySelector('#op').addEventListener('input',e=>plan.setOpacity(+e.target.value));
  d.querySelector('#fix').addEventListener('change',e=>{
    fixMode=e.target.checked; map.getContainer().style.cursor=fixMode?'crosshair':'';});
  return d;
};
info.addTo(map);
</script>
</body>
</html>
